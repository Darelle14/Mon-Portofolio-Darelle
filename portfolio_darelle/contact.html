<link rel="stylesheet" href="style.css">
<style>
  main { background: var(--ink); color: var(--cream); }
  .page-label { color: var(--gold-light); }
  .page-title { color: var(--cream); }

  .contact-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;
    padding: 0 4rem 3rem; max-width: 1100px; margin: 0 auto;
  }
  .contact-item { display: flex; align-items: flex-start; gap: 1.2rem; margin-bottom: 2rem; }
  .contact-icon {
    width: 44px; height: 44px;
    background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .contact-label {
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 0.3rem;
  }
  .contact-val { font-size: 0.95rem; color: rgba(245,240,232,0.85); }
  .contact-val a { color: inherit; text-decoration: none; }
  .contact-val a:hover { color: var(--gold-light); }

  .social-links { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; }
  .social-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.7rem 1.4rem;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 0.4rem; color: rgba(245,240,232,0.85);
    text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: all 0.25s;
  }
  .social-btn:hover {
    background: var(--gold); border-color: var(--gold);
    color: var(--ink); transform: translateY(-2px);
  }

  .form-group { margin-bottom: 1.5rem; }
  .form-label {
    display: block; font-family: 'DM Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: rgba(245,240,232,0.5); margin-bottom: 0.5rem;
  }
  .form-input, .form-textarea {
    width: 100%; padding: 0.9rem 1.2rem;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 0.4rem; color: var(--cream);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    transition: border-color 0.25s; outline: none; resize: none;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: var(--gold); background: rgba(255,255,255,0.08);
  }
  .form-textarea { height: 140px; }
  .btn-send {
    width: 100%; padding: 1rem; background: var(--gold); color: var(--ink);
    border: none; border-radius: 0.4rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: all 0.25s; letter-spacing: 0.04em;
  }
  .btn-send:hover {
    background: var(--gold-light); transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,168,76,0.3);
  }

  footer {
    text-align: center; padding: 2rem;
    background: rgba(0,0,0,0.2);
    font-size: 0.78rem; color: rgba(245,240,232,0.35);
    font-family: 'DM Mono', monospace; letter-spacing: 0.08em;
  }

  @media (max-width: 900px) {
    .contact-grid { grid-template-columns: 1fr; padding-left: 1.5rem; padding-right: 1.5rem; }
  }
</style>
